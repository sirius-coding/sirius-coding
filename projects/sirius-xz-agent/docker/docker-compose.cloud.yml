services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.cloud
    container_name: sirius-xz-agent-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "26000:26000"
    environment:
      SERVER_PORT: 26000
      SPRING_DATASOURCE_URL: jdbc:postgresql://sirius-xz-agent-pgvector:5432/sirius_xz_agent
      SPRING_DATASOURCE_USERNAME: sirius
      SPRING_DATASOURCE_PASSWORD: sirius
      SPRING_DATASOURCE_SSLMODE: disable
      SIRIUS_AI_DEEPSEEK_ENABLED: "false"
      SIRIUS_VECTORSTORE_ENABLED: "true"
