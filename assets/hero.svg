<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sirius Coding</title>
  <desc id="desc">Java, Spring, AI engineering, and microservice systems banner.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="0" x2="1104" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#10213A"/>
      <stop offset="1" stop-color="#0B3A55"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="40" x2="1040" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7B7" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.05 0 1 0 0 0.2 0 0 1 0 0.35 0 0 0 18 0" />
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)" />
  <circle cx="1010" cy="86" r="92" fill="#38BDF8" fill-opacity="0.14" filter="url(#glow)" />
  <circle cx="180" cy="276" r="110" fill="#6EE7B7" fill-opacity="0.10" filter="url(#glow)" />
  <path d="M120 264C232 166 344 147 458 196C567 242 676 258 806 220C924 186 1018 120 1090 78" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M130 284C240 194 350 176 456 222C569 272 688 286 816 248C934 213 1026 149 1096 108" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="96" y="76" width="210" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.08"/>
  <text x="118" y="100" fill="#D1FAE5" font-size="18" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="1.5">SIRIUS CODING</text>
  <text x="96" y="170" fill="#FFFFFF" font-size="56" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Java · Spring · AI</text>
  <text x="96" y="220" fill="#C7D2FE" font-size="22" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
