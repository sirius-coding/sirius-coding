  </text>
  <g opacity="0.95">
    <rect x="896" y="250" width="208" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.08" />
    <text x="924" y="278" fill="#E0F2FE" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
